# ==============================================================================
# 消融實驗 05：有 CC + 拓撲分析 + Data Augmentation，無 Logo 移除
# ==============================================================================
# 有：CC + 拓撲分析 + Data Augmentation
# 無：Gifu Logo 移除
# 目的：驗證 Logo 移除是否影響相似度學習（避免 logo shortcut）
# ==============================================================================

data:
  raw_pdf_dir: "data/raw_pdfs"
  converted_image_dir: "data/converted_images"
  pdf_dpi: 100
  pdf_max_workers: 16
  skip_pdf_conversion: false

  preprocessed_image_dir: "data/preprocessed/05_no_logo"
  preprocess_top_n: 5
  preprocess_remove_largest: true
  preprocess_padding: 2
  preprocess_max_attempts: 400
  preprocess_random_count: 10
  preprocess_max_workers: 12
  use_connected_components: true
  use_topology_analysis: true
  use_topology_pruning: true
  topology_pruning_iters: 3
  topology_pruning_ksize: 2
  min_simple_area: 40
  remove_gifu_logo: false
  skip_preprocessing: false

  dataset_dir: "dataset/05_no_logo"
  split_ratio: 0.8
  test_split_ratio: 0.2
  n_runs: 1
  base_seed: 42

  labeled_data_path: "data/converted_images"
  eval_top_k_values: [1, 5, 10]

model:
  backbone: "resnet18"
  pretrained: true
  in_channels: 1
  proj_dim: 2048
  proj_hidden: null
  pred_hidden: 512

training:
  img_size: 512
  epochs: 200
  batch_size: 64
  lr: 2.0e-5
  weight_decay: 1.0e-5
  num_workers: 4
  prefetch_factor: 2
  use_amp: true
  scheduler: "cosine"
  grad_clip: 1.0
  use_augmentation: true
  use_gpu_augmentation: true

experiment:
  output_dir: "outputs/ablation"
  exp_name: "05_no_logo"
  save_freq: 50
  log_file: "training.log"

logging:
  level: "INFO"
  log_to_file: true
  use_rich: true
