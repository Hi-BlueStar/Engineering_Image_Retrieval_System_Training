data:
  input_source: "data/吉輔提供資料.zip" # 支援 ZIP, RAR 或是已解壓的資料夾路徑
  raw_pdf_dir: "data/raw_pdfs"
  converted_image_dir: "data/converted_images"
  preprocessed_image_dir: "data/preprocessed_images"
  dataset_root: "dataset"
  train_subpath: "Component_Dataset/train"
  val_subpath: "Component_Dataset/val"
  split_ratio: 0.8
  base_seed: 42
  n_runs: 5
  use_csv_index: true

pipeline_flags:
  skip_zip_extraction: false
  skip_pdf_conversion: false
  skip_preprocessing: false

pdf_extraction:
  dpi: 100
  max_workers: 16

image_preprocessing:
  top_n: 5
  remove_largest: true
  padding: 2
  max_attempts: 400
  random_count: 10
  max_workers: 12

model:
  backbone: "resnet18"
  pretrained: true
  in_channels: 1
  proj_dim: 2048
  pred_hidden: 512

training:
  img_size: 512
  epochs: 200
  batch_size: 64
  lr: 0.00002
  weight_decay: 0.00001
  num_workers: 8
  save_freq: 10
  output_dir: "outputs"
  exp_name: "simsiam_exp"
  resume_from: null
