# ==============================================================================
# 消融實驗 02：有 CC，無拓撲分析
# ==============================================================================
# 有：連通元件(CC) + Data Augmentation + Gifu Logo 移除
# 無：拓撲分析（元件依面積排序，而非拓撲複雜度）
# 目的：驗證拓撲感知排序是否對檢索品質有貢獻
# ==============================================================================

data:
  raw_pdf_dir: "data/raw_pdfs"
  converted_image_dir: "data/converted_images"
  pdf_dpi: 100
  pdf_max_workers: 16
  skip_pdf_conversion: false

  preprocessed_image_dir: "data/preprocessed/02_no_topology"
  preprocess_top_n: 5
  preprocess_remove_largest: true
  preprocess_padding: 2
  preprocess_max_workers: 12
  use_connected_components: true
  use_topology_analysis: false
  use_topology_pruning: false
  topology_pruning_iters: 3
  topology_pruning_ksize: 2
  remove_gifu_logo: true
  logo_template_path: null
  logo_mask_region: null
  skip_preprocessing: false

  dataset_dir: "dataset/02_no_topology"
  split_ratio: 0.8
  test_split_ratio: 0.2
  n_runs: 1
  base_seed: 42

  labeled_data_path: "data/converted_images"
  eval_top_k_values: [1, 5, 10]

model:
  backbone: "resnet18"
  pretrained: true
  in_channels: 1
  proj_dim: 2048
  proj_hidden: null
  pred_hidden: 512

training:
  img_size: 512
  epochs: 200
  batch_size: 64
  lr: 2.0e-5
  weight_decay: 1.0e-5
  num_workers: 4
  prefetch_factor: 2
  use_amp: true
  scheduler: "cosine"
  grad_clip: 1.0
  use_augmentation: true
  use_gpu_augmentation: true

experiment:
  output_dir: "outputs/ablation"
  exp_name: "02_no_topology"
  save_freq: 50
  log_file: "training.log"

logging:
  level: "INFO"
  log_to_file: true
  use_rich: true
