# ==============================================================================
# SimSiam 工程圖訓練管線 — 預設設定檔（全功能啟用）
# ==============================================================================
# 使用方式:
#   python v2/prepare_data.py --config v2/configs/default.yaml
#   python v2/train.py --config v2/configs/default.yaml
#   python v2/ablation_train.py
#
# CLI 覆寫範例:
#   python v2/train.py --config v2/configs/default.yaml training.lr=3e-4
# ==============================================================================

# ------------------------------------------------------------------------------
# 資料管線設定 (Data Pipeline)
# ------------------------------------------------------------------------------
data:
  # --- 壓縮檔設定 ---
  raw_zip_path: "data/PDF.zip" # 訓練用原始壓縮檔路徑
  labeled_zip_path: "data/吉輔提供資料.zip" # 評估用標註壓縮檔路徑
  skip_extraction: false

  # --- PDF 轉換 ---
  raw_pdf_dir: "data/raw_pdfs"
  raw_labeled_pdf_dir: "data/raw_labeled_pdfs"
  converted_image_dir: "data/converted_images"
  converted_labeled_image_dir: "data/converted_labeled_images"
  pdf_dpi: 400
  pdf_max_workers: 16
  skip_pdf_conversion: false

  # --- 影像前處理 ---
  preprocessed_image_dir: "data/preprocessed_images"
  preprocessed_labeled_image_dir: "data/preprocessed_labeled_images"
  preprocess_top_n: 0 # 3
  preprocess_max_bbox_ratio: 0.7
  preprocess_min_bbox_area: 100000
  preprocess_padding: 2
  preprocess_max_workers: 12
  skip_preprocessing: false
  skip_labeled_preprocessing: false

  # --- 消融實驗前處理旗標 ---
  use_connected_components: true # 連通元件分析 + 隨機排列
  use_topology_analysis: false # 拓撲感知元件排序（孔洞數）
  use_topology_pruning: false # 拓撲分類與剪枝
  topology_pruning_iters: 20 # 遞進式剪枝最大迭代次數
  topology_pruning_ksize: 5 # 遞進式剪枝起始 Kernel 尺寸
  min_simple_area: 100 # 簡單元件（無孔洞）的最小面積門檻
  remove_gifu_logo: true # 移除 Gifu Logo
  logo_template_path: "data/Gifu_logo.png" # Logo 模板路徑（null=自動偵測角落）
  logo_mask_region: [0.75, 0.8, 1, 1] # [x1_r, y1_r, x2_r, y2_r]（可選）

  # --- 資料集分割 ---
  dataset_dir: "dataset"
  split_ratio: 0.8 # 訓練集比例（測試集 = 1 - split_ratio）
  test_split_ratio: 0.2
  n_runs: 1
  base_seed: 42
  train_subpath: "Component_Dataset/train"
  val_subpath: "Component_Dataset/train" # val = train 子集（SimSiam 無監督）
  test_subpath: "Component_Dataset/test" # 評估用測試集

  # --- 評估設定 ---
  labeled_data_path: "data/converted_labeled_images" # 含類別子目錄的評估資料集
  eval_top_k_values: [1, 5, 10, 20, 40, 80]

# ------------------------------------------------------------------------------
# 模型設定 (Model Architecture)
# ------------------------------------------------------------------------------
model:
  backbone: "resnet18"
  pretrained: true
  in_channels: 1
  proj_dim: 2048
  proj_hidden: null
  pred_hidden: 512

# ------------------------------------------------------------------------------
# 訓練設定 (Training Hyperparameters)
# ------------------------------------------------------------------------------
training:
  img_size: 256
  epochs: 200
  batch_size: 128
  lr: 2.0e-5
  weight_decay: 1.0e-5
  num_workers: 4 # cache 模式下無 disk I/O，4 個 worker 已足夠；過多反而增加 fork/IPC 成本
  prefetch_factor: 2 # float16→float32 upcast 快取路徑每 batch ~32MB，過大 prefetch 會吃 pinned RAM
  cache_in_memory: false # 已由 cache_mode 取代；保留以向下相容（true → 強制 full mode）
  cache_mode: "auto" # "auto"（依可用 RAM 自動選擇）| "full" | "partitioned" | "none"
  cache_memory_fraction: 0.6 # auto/partitioned 模式下，可用 RAM 的最大使用比例（0.0–1.0）
  channels_last: true # NHWC 記憶體格式，AMP + Ampere 上 ResNet 額外 +10–20%
  img_exts:
    - ".jpg"
    - ".png"
    - ".bmp"
    - ".tif"
    - ".webp"
  use_amp: true
  scheduler: "cosine"
  grad_clip: 1.0
  use_augmentation: true # 完整工程圖增強（旋轉、ColorJitter 等）
  use_gpu_augmentation: true # 在 GPU 上做增強（解決 CPU 瓶頸）
  resume: true # 自動從最新 checkpoint 恢復訓練
  max_batches: null

# ------------------------------------------------------------------------------
# 實驗追蹤設定 (Experiment Tracking)
# ------------------------------------------------------------------------------
experiment:
  output_dir: "outputs"
  exp_name: "simsiam_exp"
  save_freq: 10
  log_file: "training.log"

# ------------------------------------------------------------------------------
# 日誌設定 (Logging)
# ------------------------------------------------------------------------------
logging:
  level: "INFO"
  log_to_file: true
  use_rich: true
